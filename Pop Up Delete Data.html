<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Delete Confirmation</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #e7e7ec;
  font-family: Arial, Helvetica, sans-serif;
}

/* modal */
.modal {
  width: 900px;
  margin: 60px auto;
  background: #efeff2;
  border-radius: 20px;
  padding: 50px 40px;
  text-align: center;
}

/* title */
.title {
  font-size: 28px;
  font-weight: 700;
  color: #333;
  margin-bottom: 12px;
}

/* subtitle */
.subtitle {
  font-size: 16px;
  color: #555;
  margin-bottom: 28px;
}

/* buttons */
.actions {
  display: flex;
  justify-content: center;
  gap: 18px;
}

.btn {
  width: 130px;
  height: 44px;
  border: none;
  font-size: 16px;
  font-weight: 600;
}

/* cancel */
.btn.cancel {
  background: #bfc3c9;
  color: #fff;
}

/* delete */
.btn.delete {
  background: #c40000;
  color: #fff;
}
</style>

</head>
<body>

<div class="modal">
  <div class="title">Are you sure want to delete this data?</div>
  <div class="subtitle">You will not be able to recover this data!</div>

  <div class="actions">
    <button class="btn cancel">Cancel</button>
    <button class="btn delete">Delete</button>
  </div>
</div>

</body>
</html>
