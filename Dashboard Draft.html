<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Draft</title>

<style>
* {
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  margin: 0;
  display: flex;
  background: #f5f6fa;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  background: #fff;
  height: 100vh;
  border-right: 1px solid #ddd;
  display: flex;
  flex-direction: column;
}

.logo {
  padding: 20px;
  font-weight: bold;
  font-size: 20px;
  color: #8b0000;
}

.menu {
  flex: 1;
}

.menu-item {
  padding: 15px 20px;
  cursor: pointer;
  color: #333;
}

.menu-item.active {
  background: #eaeaea;
  font-weight: bold;
}

.logout {
  padding: 15px;
  text-align: center;
  border: 2px solid red;
  margin: 20px;
  color: red;
  cursor: pointer;
}

/* MAIN */
.main {
  flex: 1;
  padding: 30px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.title {
  font-size: 32px;
  font-weight: bold;
  color: #0b3d2e;
}

.top-actions {
  display: flex;
  gap: 15px;
  align-items: center;
}

.btn {
  background: #198754;
  color: white;
  padding: 10px 18px;
  border-radius: 6px;
  cursor: pointer;
}

.search {
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
}

/* TABLE */
.table {
  margin-top: 20px;
  background: white;
  border: 1px solid #ddd;
  border-radius: 6px;
  overflow: hidden;
}

.table-header {
  padding: 15px;
  background: #f1f1f1;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  border-top: 1px solid #eee;
  align-items: center;
}

.doc-info {
  display: flex;
  flex-direction: column;
}

.doc-title {
  font-weight: bold;
}

.doc-sub {
  font-size: 12px;
  color: gray;
}

.actions {
  display: flex;
  gap: 10px;
}

.icon-btn {
  width: 35px;
  height: 35px;
  border-radius: 6px;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  cursor: pointer;
}

.edit {
  background: #198754;
}

.delete {
  background: #dc3545;
}

/* PAGINATION */
.pagination {
  margin-top: 30px;
  text-align: center;
}

.page {
  display: inline-block;
  padding: 8px 12px;
  margin: 5px;
  background: #ddd;
  border-radius: 4px;
  cursor: pointer;
}

.page.active {
  background: #6c8cd5;
  color: white;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">
    <img
        class="doc-image"
        src="umy.png" 
        style="width: 100%; height: auto;"
        alt="Stakeholder"
        />
      </div>

  <div class="menu">
    <div class="menu-item">Insight</div>
    <div class="menu-item">Documents</div>
    <div class="menu-item active">Draft</div>
  </div>

  <div class="logout">Logout</div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <div class="title">Documents</div>

    <div class="top-actions">
      <div class="btn">+ Create New</div>
      <input class="search" placeholder="Search">
    </div>
  </div>

  <!-- TABLE -->
  <div class="table">

    <div class="table-header">
      <div>Academic Documents</div>
      <div>Action</div>
    </div>

    <div class="row">
      <div class="doc-info">
        <div class="doc-title">Transkrip Nilai</div>
        <div class="doc-sub">Transcript of Records</div>
      </div>

      <div class="actions">
        <div class="icon-btn edit">✏️</div>
        <div class="icon-btn delete">🗑️</div>
      </div>
    </div>

    <div class="row">
      <div class="doc-info">
        <div class="doc-title">Pendaftaran Skripsi</div>
        <div class="doc-sub">Thesis Registration</div>
      </div>

      <div class="actions">
        <div class="icon-btn edit">✏️</div>
        <div class="icon-btn delete">🗑️</div>
      </div>
    </div>

    <div class="row">
      <div class="doc-info">
        <div class="doc-title">Surat Aktif Kuliah</div>
        <div class="doc-sub">Certificate of Enrollment</div>
      </div>

      <div class="actions">
        <div class="icon-btn edit">✏️</div>
        <div class="icon-btn delete">🗑️</div>
      </div>
    </div>

  </div>

  <!-- PAGINATION -->
  <div class="pagination">
    <span>Previous</span>
    <span class="page active">1</span>
    <span class="page">2</span>
    <span class="page">3</span>
    <span class="page">4</span>
    <span class="page">5</span>
    <span>Next</span>
  </div>

</div>

</body>
</html>
