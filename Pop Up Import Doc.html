<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Import Academic Document Template</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #e7e7ec;
  font-family: Arial, Helvetica, sans-serif;
}

/* container utama */
.modal {
  width: 900px;
  margin: 40px auto;
  background: #efeff2;
  border-radius: 18px;
  padding: 32px 36px 28px;
}

/* title */
.title {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 28px;
  color: #333;
}

/* label */
.label {
  font-size: 14px;
  margin-bottom: 8px;
  color: #444;
}

.label span {
  color: red;
}

/* input */
.input {
  width: 100%;
  height: 48px;
  border: none;
  background: #d9d9de;
  padding: 0 14px;
  font-size: 14px;
  margin-bottom: 22px;
}

/* file upload */
.file-box {
  background: #d9d9de;
  height: 48px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 10px;
  margin-bottom: 6px;
}

.file-btn {
  border: 1px solid #aaa;
  padding: 6px 10px;
  background: #eee;
  font-size: 13px;
}

.file-text {
  font-size: 14px;
}

.file-note {
  font-size: 12px;
  color: #777;
  margin-bottom: 30px;
}

/* buttons */
.actions {
  display: flex;
  justify-content: flex-end;
  gap: 16px;
}

.btn {
  width: 110px;
  height: 44px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}

.btn.cancel {
  background: #bfc3c9;
  color: #fff;
}

.btn.save {
  background: #0c9b63;
  color: #fff;
}
</style>
</head>

<body>

<div class="modal">
  <div class="title">Import Academic Document Template</div>

  <div class="label"><span>*</span> Document Name (Indonesia)</div>
  <input class="input" value="Pengantar Kerja Praktik">

  <div class="label"><span>*</span> Document Name (English)</div>
  <input class="input" value="Internship Introduction">

  <div class="label"><span>*</span> File</div>
  <div class="file-box">
    <div class="file-btn">Browse File</div>
    <div class="file-text">Pengantar Kerja Praktik - TI .PDF</div>
  </div>

  <div class="file-note">Format must PDF</div>

  <div class="actions">
    <button class="btn cancel">Cancel</button>
    <button class="btn save">Save</button>
  </div>
</div>

</body>
</html>
