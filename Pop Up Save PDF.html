<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Import Academic Document</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #e7e7ec;
  font-family: Arial, Helvetica, sans-serif;
}

/* modal container */
.modal {
  width: 900px;
  margin: 40px auto;
  background: #efeff2;
  border-radius: 20px;
  padding: 32px 40px 30px;
}

/* title */
.title {
  font-size: 28px;
  font-weight: 700;
  color: #333;
  margin-bottom: 26px;
}

/* label */
.label {
  font-size: 14px;
  color: #444;
  margin-bottom: 6px;
}

/* input */
.input {
  width: 100%;
  height: 48px;
  background: #d9d9de;
  border: none;
  padding: 0 14px;
  font-size: 14px;
  color: #555;
  margin-bottom: 22px;
}

/* actions */
.actions {
  display: flex;
  justify-content: flex-end;
  gap: 16px;
  margin-top: 10px;
}

/* button */
.btn {
  width: 110px;
  height: 44px;
  border: none;
  font-size: 16px;
  font-weight: 600;
}

.btn.cancel {
  background: #bfc3c9;
  color: #fff;
}

.btn.save {
  background: #bfc3c9; /* disabled style */
  color: #fff;
  opacity: 0.9;
}
</style>

</head>
<body>

<div class="modal">
  <div class="title">Import Academic Document</div>

  <div class="label">*Document Name (Indonesia)</div>
  <input class="input" placeholder="Jawaban Anda...">

  <div class="label">*Document Name (English)</div>
  <input class="input" placeholder="Your Answer...">

  <div class="actions">
    <button class="btn cancel">Cancel</button>
    <button class="btn save">Save</button>
  </div>
</div>

</body>
</html>
